# ~/.config/starship.toml

[battery]
full_symbol = "🔋"
charging_symbol = "🔌"
discharging_symbol = "⚡"

[[battery.display]]
threshold = 10
style = "bold red"

[character]
error_symbol = "[✖](bold red) "

[cmd_duration]
min_time = 10_000
format = " took [$duration]($style)"

[directory]
truncation_length = 5
truncate_to_repo = false
format = "[$path]($style)[$lock_symbol]($lock_style) "

[git_branch]
format = " [$symbol$branch]($style) "
symbol = "🍣 "
style = "bold yellow"

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[hostname]
ssh_only = false
format = "<[$hostname]($style)>"
trim_at = "-"
style = "bold dimmed white"

[python]
format = "[$symbol$version]($style) "
style = "bold green"

[rust]
format = "[$symbol$version]($style) "
style = "bold green"

[time]
time_format = "%T"
format = "🕙 $time($style) "
style = "bright-white"
disabled = false

[ruby]
symbol = '🔺 '

[sudo]
style = 'bold green'
symbol = '👩‍💻 '
disabled = false

[username]
style_user = 'white bold'
style_root = 'black bold'
format = '[$user]($style)'
show_always = true

[package]
disabled = true

[nodejs]
disabled = true

# Jira profile module for Starship prompt
# Shows active Jira profile and project key
#
# Add this to your ~/.config/starship.toml
# Make sure jira-profile.sh is installed to ~/.local/bin/

[custom.jira]
command = "jira-profile"
when = "test -f ~/.config/jira-cli/config.yml"
format = "[◆ $output]($style) "
style = "bold blue"
shell = ["bash", "--noprofile", "--norc"]
